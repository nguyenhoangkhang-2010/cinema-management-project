<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Đăng nhập - Cinema All Star</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/login.css}">
</head>
<body>
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5 col-lg-4">
            <div class="card login-card p-4">
                <div class="text-center mb-4">
                    <h2 class="fw-bold text-dark">Cinema <span class="text-warning">All Star</span></h2>
                    <p class="text-muted">Chào mừng bạn quay trở lại!</p>
                </div>
                <div th:if="${param.error}" class="alert alert-danger py-2 small text-center">
                    Email hoặc mật khẩu không chính xác!
                </div>
                <div th:if="${param.success}" class="alert alert-success py-2 small text-center">
                    Đăng ký thành công! Hãy đăng nhập.
                </div>
                <form th:action="@{/login}" method="post">
                    <div class="mb-3">
                        <label class="form-label small fw-bold">Email</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0"><i class="bi bi-envelope"></i></span>
                            <input type="email" name="email" class="form-control bg-light border-start-0"
                                   placeholder="name@example.com" required autofocus>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label small fw-bold">Mật khẩu</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0"><i class="bi bi-lock"></i></span>
                            <input type="password" name="password" class="form-control bg-light border-start-0"
                                   placeholder="••••••••" required>
                        </div>
                    </div>

                    <div class="d-flex justify-content-between mb-4">
                        <div class="form-check">
                            <input type="checkbox" class="form-check-input" id="rememberMe" name="remember-me">
                            <label class="form-check-label small" for="rememberMe">Ghi nhớ tôi</label>
                        </div>
                        <a href="#" class="small text-decoration-none text-warning">Quên mật khẩu?</a>
                    </div>

                    <button type="submit" class="btn btn-warning w-100 fw-bold py-2 mb-3">ĐĂNG NHẬP</button>

                    <p class="text-center small text-muted">
                        Bạn chưa có tài khoản?
                        <a th:href="@{/register}" class="text-warning fw-bold text-decoration-none">Đăng ký ngay</a>
                    </p>
                </form>
            </div>

            <div class="text-center mt-4">
                <a th:href="@{/home}" class="text-muted text-decoration-none small">
                    <i class="bi bi-arrow-left"></i> Quay lại trang chủ
                </a>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
