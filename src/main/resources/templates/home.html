<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Cinema All Star</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/home.css}">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-light bg-white py-3 shadow-sm">
    <div class="container">
        <a class="navbar-brand" href="#">Cinema All Star</a>
        <div class="navbar-nav">
            <a class="nav-link" href="#">Phim</a>
            <a class="nav-link" href="#">Star Shop</a>
            <a class="nav-link" href="#">Sự Kiện</a>
        </div>

        <div class="navbar-nav ms-auto">
            <th:block sec:authorize="isAnonymous()">
                <a class="nav-link" th:href="@{/login}">Đăng Nhập</a>
            </th:block>
            <div class="nav-item dropdown" sec:authorize="isAuthenticated()">
                <a class="nav-link dropdown-toggle d-flex align-items-center" href="#" id="userDropdown" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                    <img src="https://i.pravatar.cc/150?u=fake@cinema.com"
                         class="rounded-circle border"
                         alt="Avatar"
                         style="width: 38px; height: 38px; object-fit: cover;">
                    <span class="ms-2 d-none d-sm-inline" sec:authentication="name">User</span>
                </a>

                <ul class="dropdown-menu dropdown-menu-end shadow border-0" aria-labelledby="userDropdown">
                    <li><h6 class="dropdown-header">Xin chào!</h6></li>
                    <li><a class="dropdown-item" href="/profile"><i class="bi bi-person me-2"></i>Thông tin cá nhân</a></li>
                    <li><a class="dropdown-item" href="/my-tickets"><i class="bi bi-ticket-perforated me-2"></i>Vé của tôi</a></li>
                    <li sec:authorize="hasRole('ADMIN')">
                        <hr class="dropdown-divider">
                    </li>
                    <li sec:authorize="hasRole('ADMIN')">
                        <a class="dropdown-item text-danger fw-bold" href="/admin/dashboard">
                            <i class="bi bi-speedometer2 me-2"></i>QUẢN TRỊ TỔNG
                        </a>
                    </li>

                    <li><hr class="dropdown-divider"></li>
                    <li>
                        <form th:action="@{/logout}" method="post" id="logoutForm" class="d-none"></form>
                        <a class="dropdown-item" href="javascript:void(0)" onclick="document.getElementById('logoutForm').submit();">
                            <i class="bi bi-box-arrow-right me-2"></i>Đăng xuất
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </div>
</nav>

<div class="container-fluid p-0">
    <img src="https://i.pinimg.com/1200x/cb/a2/8f/cba28fa0c8e5cc8823090c602378ec0f.jpg" class="w-100" alt="Banner">
</div>

<div class="container search-bar-container">
    <div class="row bg-white p-3 shadow rounded">
        <div class="col-md-3"><select class="form-select"><option>Chọn Phim</option></select></div>
        <div class="col-md-3"><select class="form-select"><option>Chọn Rạp</option></select></div>
        <div class="col-md-2"><select class="form-select"><option>Chọn Ngày</option></select></div>
        <div class="col-md-2"><select class="form-select"><option>Chọn Suất</option></select></div>
        <div class="col-md-2"><button class="btn btn-warning w-100 fw-bold">Mua vé nhanh</button></div>
    </div>
</div>

<div class="container mt-5">
    <h3 class="mb-4">PHIM ĐANG CHIẾU</h3>
    <div class="row">
        <div class="col-md-3 mb-4" th:each="movie : ${homePage.phimDangChieu}">
            <div class="card border-0">
                <img th:src="${movie.poster}" class="card-img-top rounded" style="height: 350px; object-fit: cover;">
                <div class="card-body p-0 pt-2">
                    <h6 class="card-title" th:text="${movie.tenPhim}">Tên phim</h6>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="container mt-5">
    <h3 class="mb-4">TIN KHUYẾN MÃI</h3>
    <div class="row">
        <div class="col-md-3 mb-4" th:each="promo : ${homePage.khuyenMai}">
            <div class="card border-0">
                <img th:src="${promo.poster}" class="img-fluid rounded mb-2" alt="Khuyến mãi">

                <p class="fw-bold" th:text="${promo.tenKhuyenMai}">Tiêu đề khuyến mãi</p>

                <small class="text-muted" th:text="${promo.moTa}">Mô tả ngắn</small>
            </div>
        </div>
    </div>
</div>

<footer class="bg-dark text-light mt-5 py-5">
    <div class="container text-center">
        <p>Galaxy Cinema - Copyright 2026</p>
    </div>
</footer>

</body>
</html>
